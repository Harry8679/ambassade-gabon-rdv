name: Déploiement GitHub Pages

# Déploie automatiquement le site à chaque push sur la branche main.
on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Permissions nécessaires au déploiement sur Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Installation des dépendances
        run: npm ci

      - name: Build de production
        run: npm run build

      - name: Configuration Pages
        uses: actions/configure-pages@v5

      - name: Envoi de l'artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Déploiement sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
